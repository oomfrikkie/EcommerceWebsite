name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Frontend — Vercel
        run: echo "Deploying frontend to Vercel -> https://ecommerce-website-vert-phi-10.vercel.app"

      - name: Backend — Railway
        run: echo "Deploying backend to Railway -> https://satisfied-commitment-production-e830.up.railway.app"
