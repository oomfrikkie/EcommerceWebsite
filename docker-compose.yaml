version: "3.9"

services:
  postgres_db:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data_init:/docker-entrypoint-initdb.d
    networks:
      - app-network

  adminer:
    container_name: adminer_ui
    image: adminer
    ports:
      - "5050:8080"
    depends_on:
      - postgres_db
    networks:
      - app-network

  backend:
    container_name: backend_app
    build:
      context: ./backend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres_db
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    container_name: frontend_app
    build:
      context: ./frontend
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
